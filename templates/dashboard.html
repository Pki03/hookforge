<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HookForge Dashboard</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a; color: #e2e8f0; min-height: 100vh;
    }
    .header {
      background: #1e293b; border-bottom: 1px solid #334155; padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 1.25rem; font-weight: 600; color: #38bdf8; }
    .header .status { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: #64748b; }
    .header .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; }
    .container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem; margin-bottom: 2rem;
    }
    .stat-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem;
      padding: 1.25rem; text-align: center;
    }
    .stat-card .value { font-size: 1.75rem; font-weight: 700; color: #38bdf8; }
    .stat-card .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-top: 0.25rem; }
    .stat-card.delivered .value { color: #22c55e; }
    .stat-card.failed .value { color: #ef4444; }
    .stat-card.dead .value { color: #f59e0b; }
    .stat-card.rate .value { color: #a78bfa; }
    .stat-card.pending .value { color: #94a3b8; }
    .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 768px) { .panel-grid { grid-template-columns: 1fr; } }
    .panel {
      background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; overflow: hidden;
    }
    .panel-title {
      background: #334155; padding: 0.75rem 1rem; font-size: 0.8rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8;
    }
    .panel-body { padding: 0; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.6rem 1rem; text-align: left; font-size: 0.825rem; }
    th { background: #1e293b; color: #64748b; font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #334155; }
    td { border-top: 1px solid #1e293b; }
    tbody tr { transition: background 0.1s; cursor: pointer; }
    tbody tr:hover { background: #334155; }
    .badge {
      display: inline-block; padding: 0.125rem 0.5rem; border-radius: 9999px;
      font-size: 0.7rem; font-weight: 500;
    }
    .badge.delivered { background: #052e16; color: #22c55e; }
    .badge.failed { background: #450a0a; color: #ef4444; }
    .badge.dead { background: #451a03; color: #f59e0b; }
    .badge.pending { background: #1e293b; color: #94a3b8; }
    .badge.retrying { background: #1c1917; color: #fb923c; }
    .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.75rem; color: #94a3b8; }
    .detail-grid { display: grid; grid-template-columns: auto 1fr; gap: 0.5rem 1rem; font-size: 0.825rem; padding: 1rem; }
    .detail-grid .label { color: #64748b; }
    .detail-grid .value { color: #e2e8f0; word-break: break-all; }
    .detail-section { padding: 1rem; border-top: 1px solid #334155; }
    .detail-section h4 { font-size: 0.75rem; font-weight: 600; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem;
      border: none; border-radius: 0.5rem; font-size: 0.8rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #38bdf8; color: #0f172a; }
    .btn-warning { background: #f59e0b; color: #0f172a; }
    .btn-sm { padding: 0.3rem 0.75rem; font-size: 0.75rem; }
    .placeholder { padding: 2rem; text-align: center; color: #64748b; font-size: 0.875rem; }
    .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .htmx-request.htmx-indicator { opacity: 1; }
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem; padding: 0.75rem 1.25rem;
      border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; z-index: 100;
      animation: fadeIn 0.2s, fadeOut 0.3s 2.7s;
    }
    .toast.success { background: #052e16; color: #22c55e; border: 1px solid #22c55e; }
    .toast.error { background: #450a0a; color: #ef4444; border: 1px solid #ef4444; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    .loading-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #334155; border-top-color: #38bdf8; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body hx-headers='{"Accept": "text/html"}'>
  <div class="header">
    <h1>HookForge Dashboard</h1>
    <div class="status">
      <span class="dot"></span>
      <span>Live (HTMX)</span>
    </div>
  </div>
  <div class="container">
    <div id="stats-grid"
         hx-get="/api/v1/dashboard/stats"
         hx-trigger="every 3s"
         hx-swap="innerHTML">
      {{template "_stats.html" .}}
    </div>

    <div class="panel-grid">
      <div class="panel">
        <div class="panel-title">Recent Events</div>
        <div class="panel-body" id="events-table"
             hx-get="/api/v1/dashboard/events"
             hx-trigger="every 4s"
             hx-swap="innerHTML">
          {{template "_events.html" .}}
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Event Detail</div>
        <div class="panel-body" id="event-detail-panel">
          <div class="placeholder">Click an event to see details</div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    document.body.addEventListener('htmx:afterRequest', function(e) {
      if (e.detail.requestConfig.verb === 'post' && e.detail.path.endsWith('/replay')) {
        var status = e.detail.successful ? 'success' : 'error';
        var msg = e.detail.successful ? 'Event re-enqueued for delivery' : 'Replay failed';
        showToast(msg, status);
        htmx.trigger('#events-table', 'htmx:load');
        setTimeout(function() {
          var detailPanel = document.getElementById('event-detail-panel');
          if (detailPanel) detailPanel.innerHTML = '<div class="placeholder">Click an event to see details</div>';
        }, 500);
      }
    });

    function showToast(msg, type) {
      var c = document.getElementById('toast-container');
      var t = document.createElement('div');
      t.className = 'toast ' + type;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(function() { t.remove(); }, 3000);
    }
  </script>
</body>
</html>
