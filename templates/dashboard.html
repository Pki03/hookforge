<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HookForge Dashboard</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a; color: #e2e8f0; min-height: 100vh;
    }
    .header {
      background: #1e293b; border-bottom: 1px solid #334155; padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 1.25rem; font-weight: 600; color: #38bdf8; }
    .header .status { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: #64748b; }
    .header .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
    .header .dot.offline { background: #ef4444; }
    .container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem; margin-bottom: 2rem;
    }
    .stat-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem;
      padding: 1.25rem; text-align: center;
    }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: #38bdf8; }
    .stat-card .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-top: 0.25rem; }
    .stat-card.delivered .value { color: #22c55e; }
    .stat-card.failed .value { color: #ef4444; }
    .stat-card.dead .value { color: #f59e0b; }
    .stat-card.rate .value { color: #a78bfa; }
    .stat-card.pending .value { color: #64748b; }
    table {
      width: 100%; border-collapse: collapse; background: #1e293b;
      border: 1px solid #334155; border-radius: 0.75rem; overflow: hidden;
    }
    th, td { padding: 0.75rem 1rem; text-align: left; font-size: 0.875rem; }
    th { background: #334155; color: #94a3b8; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
    td { border-top: 1px solid #1e293b; }
    .badge {
      display: inline-block; padding: 0.125rem 0.5rem; border-radius: 9999px;
      font-size: 0.75rem; font-weight: 500;
    }
    .badge.delivered { background: #052e16; color: #22c55e; }
    .badge.failed { background: #450a0a; color: #ef4444; }
    .badge.dead { background: #451a03; color: #f59e0b; }
    .badge.pending { background: #1e293b; color: #94a3b8; }
    .badge.retrying { background: #1c1917; color: #fb923c; }
    .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.8rem; color: #94a3b8; }
    tbody tr:hover { background: #334155; }
    @media (prefers-color-scheme: light) {
      body { background: #f8fafc; color: #1e293b; }
      .header { background: #ffffff; border-color: #e2e8f0; }
      .stat-card { background: #ffffff; border-color: #e2e8f0; }
      table { background: #ffffff; border-color: #e2e8f0; }
      th { background: #f1f5f9; color: #64748b; }
      td { border-color: #f1f5f9; }
      .badge.pending { background: #f1f5f9; color: #64748b; }
      .badge.retrying { background: #fff7ed; color: #ea580c; }
      .header h1 { color: #0284c7; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>HookForge Dashboard</h1>
    <div class="status">
      <span class="dot" id="ws-dot"></span>
      <span id="ws-status">Connecting...</span>
    </div>
  </div>
  <div class="container">
    <div id="stats-grid"
         hx-get="/api/v1/dashboard/stats"
         hx-trigger="every 2s"
         hx-swap="innerHTML">
      {{template "_stats.html" .}}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;">
      <div>
        <h2 style="font-size:1rem;margin-bottom:0.75rem;color:#94a3b8;">Recent Events</h2>
        <div id="events-table"
             hx-get="/api/v1/dashboard/events"
             hx-trigger="every 3s"
             hx-swap="innerHTML">
          {{template "_events.html" .}}
        </div>
      </div>
      <div>
        <h2 style="font-size:1rem;margin-bottom:0.75rem;color:#94a3b8;">Event Detail</h2>
        <div id="event-detail-panel" style="background:#1e293b;border:1px solid #334155;border-radius:0.75rem;padding:1.5rem;text-align:center;color:#64748b;font-size:0.875rem;">
          Click an event to see details
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var dot = document.getElementById('ws-dot');
      var statusEl = document.getElementById('ws-status');
      var proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      var ws = new WebSocket(proto + '//' + window.location.host + '/api/v1/ws');

      ws.onopen = function() {
        dot.className = 'dot';
        statusEl.textContent = 'Live (WS)';
      };

      ws.onclose = function() {
        dot.className = 'dot offline';
        statusEl.textContent = 'Fallback (HTMX)';
      };

      ws.onerror = function() {
        dot.className = 'dot offline';
        statusEl.textContent = 'Fallback (HTMX)';
      };

      ws.onmessage = function(e) {
        try {
          var data = JSON.parse(e.data);
          if (data.stats) renderStats(data.stats);
          if (data.events) renderEvents(data.events);
        } catch(err) {}
      };

      function renderStats(s) {
        var html = '<div class="stats-grid">' +
          card(s.total_sent, 'Total Events', '') +
          card(s.delivered, 'Delivered', 'delivered') +
          card(s.failed, 'Failed', 'failed') +
          card(s.dead, 'Dead Letter', 'dead') +
          card(s.pending, 'Pending / Retrying', 'pending') +
          card(s.delivery_rate_percent.toFixed(1) + '%', 'Delivery Rate', 'rate') +
          '</div>';
        document.getElementById('stats-grid').innerHTML = html;
      }

      function card(val, label, cls) {
        return '<div class="stat-card ' + cls + '"><div class="value">' + val + '</div><div class="label">' + label + '</div></div>';
      }

      function renderEvents(events) {
        var html = '<table><thead><tr><th>Event ID</th><th>Endpoint</th><th>Status</th><th>Attempts</th><th>Age</th></tr></thead><tbody>';
        if (!events || events.length === 0) {
          html += '<tr><td colspan="5" style="text-align:center;color:#64748b;padding:2rem;">No events yet</td></tr>';
        } else {
          for (var i = 0; i < events.length; i++) {
            var e = events[i];
            html += '<tr>' +
              '<td class="mono">' + e.id.slice(0, 8) + '</td>' +
              '<td class="mono">' + e.endpoint_id.slice(0, 8) + '</td>' +
              '<td><span class="badge ' + e.status + '">' + e.status + '</span></td>' +
              '<td>' + e.attempts + '/' + e.max_retries + '</td>' +
              '<td>' + timeAgo(e.created_at) + '</td>' +
              '</tr>';
          }
        }
        html += '</tbody></table>';
        document.getElementById('events-table').innerHTML = html;
      }

      function timeAgo(iso) {
        var ms = Date.now() - new Date(iso).getTime();
        if (ms < 60000) return 'just now';
        if (ms < 3600000) return Math.floor(ms / 60000) + ' minutes ago';
        if (ms < 86400000) return Math.floor(ms / 3600000) + ' hours ago';
        return Math.floor(ms / 86400000) + ' days ago';
      }
    })();
  </script>
</body>
</html>
