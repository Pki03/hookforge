<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HookForge Dashboard</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a; color: #e2e8f0; min-height: 100vh;
    }
    .header {
      background: #1e293b; border-bottom: 1px solid #334155; padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 1.25rem; font-weight: 600; color: #38bdf8; }
    .header span { color: #64748b; font-size: 0.875rem; }
    .container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem; margin-bottom: 2rem;
    }
    .stat-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem;
      padding: 1.25rem; text-align: center;
    }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: #38bdf8; }
    .stat-card .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-top: 0.25rem; }
    .stat-card.delivered .value { color: #22c55e; }
    .stat-card.failed .value { color: #ef4444; }
    .stat-card.dead .value { color: #f59e0b; }
    .stat-card.rate .value { color: #a78bfa; }
    .stat-card.pending .value { color: #64748b; }
    table {
      width: 100%; border-collapse: collapse; background: #1e293b;
      border: 1px solid #334155; border-radius: 0.75rem; overflow: hidden;
    }
    th, td { padding: 0.75rem 1rem; text-align: left; font-size: 0.875rem; }
    th { background: #334155; color: #94a3b8; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
    td { border-top: 1px solid #1e293b; }
    .badge {
      display: inline-block; padding: 0.125rem 0.5rem; border-radius: 9999px;
      font-size: 0.75rem; font-weight: 500;
    }
    .badge.delivered { background: #052e16; color: #22c55e; }
    .badge.failed { background: #450a0a; color: #ef4444; }
    .badge.dead { background: #451a03; color: #f59e0b; }
    .badge.pending { background: #1e293b; color: #94a3b8; }
    .badge.retrying { background: #1c1917; color: #fb923c; }
    .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.8rem; color: #94a3b8; }
    @media (prefers-color-scheme: light) {
      body { background: #f8fafc; color: #1e293b; }
      .header { background: #ffffff; border-color: #e2e8f0; }
      .stat-card { background: #ffffff; border-color: #e2e8f0; }
      table { background: #ffffff; border-color: #e2e8f0; }
      th { background: #f1f5f9; color: #64748b; }
      td { border-color: #f1f5f9; }
      .badge.pending { background: #f1f5f9; color: #64748b; }
      .badge.retrying { background: #fff7ed; color: #ea580c; }
      .header h1 { color: #0284c7; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>HookForge Dashboard</h1>
    <span>Live monitoring</span>
  </div>
  <div class="container">
    <div id="stats-grid"
         hx-get="/api/v1/dashboard/stats"
         hx-trigger="every 2s"
         hx-swap="innerHTML">
      {{template "_stats.html" .}}
    </div>
    <h2 style="font-size:1rem;margin-bottom:0.75rem;color:#94a3b8;">Recent Events</h2>
    <div id="events-table"
         hx-get="/api/v1/dashboard/events"
         hx-trigger="every 3s"
         hx-swap="innerHTML">
      {{template "_events.html" .}}
    </div>
  </div>
</body>
</html>
